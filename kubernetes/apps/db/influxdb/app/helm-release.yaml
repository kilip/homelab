---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: influxdb
  namespace: database
spec:
  interval: 15m
  chart:
    spec:
      chart: influxdb2
      version: 2.1.1
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    adminUser:
      organization: "influxdata"
      bucket: "default"
      user: "${INFLUXDB_USER}"
      password: "${INFLUXDB_PASS}"
      retention_policy: "0s"
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      storageClassName: longhorn
      size: 10Gi
    service:
      type: LoadBalancer
      port: 8086
      loadBalancerSourceRanges: [10.0.0.222]
