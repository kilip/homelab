---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app telegraf
  namespace: database
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app

    image:
      repository: "telegraf"
      tag: "1.26-alpine"
      pullPolicy: IfNotPresent

    strategy:
      type: Recreate

    env:
      INFLUX_HOST: "http://influxdb.default.svc.cluster.local:8086"
      USER: "${INFLUXDB_USER}"
      INFLUX_TOKEN: "${INFLUXDB_TOKEN}"
      INFLUX_BUCKET: "mqtt"
      INFLUX_ORG: "olympus"
      HOSTNAME: "telegraf"

    persistence:
      config:
        enabled: true
        type: secret
        mountPath: "/etc/telegraf"
        name: telegraf-config
      consumers:
        enabled: true
        type: secret
        mountPath: "/etc/telegraf/telegraf.d"
        name: telegraf-consumers

    service:
      main:
        ports:
          http:
            enabled: false
          tcp:
            enabled: true
            port: 8125
            containerPort: 8125

    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
      startup:
        enabled: false
