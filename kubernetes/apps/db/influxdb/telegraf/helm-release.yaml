---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app telegraf
  namespace: database
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app

    image:
      repository: "telegraf"
      tag: "1.26-alpine"
      pullPolicy: IfNotPresent

    strategy:
      type: Recreate

    env:
      INFLUX_HOST: "http://influxdb.database.svc.cluster.local:8086"
      INFLUX_BUCKET: "mqtt"
      INFLUX_ORG: "olympus"
      HOSTNAME: "telegraf"
      INFLUX_TOKEN:
        valueFrom:
          secretKeyRef:
            name: influxdb-secrets
            key: admin-user-token

    envFrom:
      - secretRef:
          name: telegraf-secrets

    persistence:
      telegraf:
        enabled: true
        type: configMap
        mountPath: "/etc/telegraf"
        name: telegraf-config
      consumers:
        enabled: true
        type: configMap
        mountPath: "/etc/telegraf/telegraf.d"
        name: telegraf-consumers
    service:
      main:
        ports:
          http:
            enabled: false
          tcp:
            enabled: true
            port: 8125
            containerPort: 8125

    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
      startup:
        enabled: false
