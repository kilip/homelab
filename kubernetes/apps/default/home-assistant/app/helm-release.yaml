---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/onedr0p/home-assistant
      tag: 2023.5.2
    env:
      TZ: "${TIMEZONE}"
      POSTGRES_HOST: postgresql.database.svc.cluster.local
      POSTGRES_DB: home_assistant
      POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"
      INFLUXDB_HOST: influxdb.database.svc.cluster.local
      INFLUXDB_PORT: 8086
      INFLUXDB_SOURCE: "k8s"
    envFrom:
      - secretRef:
          name: home-assistant-secret
    service:
      main:
        ports:
          http:
            port: 8123
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          hajimari.io/icon: mdi:home-assistant
        hosts:
          - host: &host "hass.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
      startup:
        enabled: false

    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch

    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 512Mi

    volumeClaimTemplates:
      - name: &hass-config hass-config
        mountPath: /config
        subPath: config
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn

    persistence:
      scripts:
        enabled: true
        type: configMap
        name: hass-scripts
        defaultMode: 0777
      ga-service-account:
        enabled: true
        type: secret
        name: home-assistant-secret
        defaultMode: 256
        subPath:
          - path: GA_SERVICE_ACCOUNT
            mountPath: /config/packages/integrations/ga-service-account.json

    initContainers:
      01-init-db:
        image: ghcr.io/onedr0p/postgres-initdb:14.7
        imagePullPolicy: IfNotPresent
        envFrom:
          - secretRef:
              name: home-assistant-secret
        env:
          POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"

      02-fake-configuration:
        image: busybox:1.36.0
        command: ["/fake-config.sh"]
        securityContext:
          runAsUser: 568
          runAsGroup: 568
        volumeMounts:
          - name: *hass-config
            mountPath: /tmp/hass-config
          - name: scripts
            subPath: fake-config.sh
            mountPath: /fake-config.sh

    sidecars:
      02-gitsync-watch:
        image: registry.k8s.io/git-sync/git-sync:v3.6.6
        env:
          GIT_SYNC_USERNAME: "${GITSYNC_USERNAME}"
          GIT_SYNC_PASSWORD: "${GITSYNC_PASSWORD}"
        envFrom:
          - configMapRef:
              name: hass-sync-env
        args:
          - "-depth=1"
          - "-v=3"
        securityContext:
          runAsUser: 568
          runAsGroup: 568
        volumeMounts:
          - name: *hass-config
            mountPath: /tmp/hass-config
          - name: scripts
            subPath: post-sync.sh
            mountPath: /post-sync.sh
