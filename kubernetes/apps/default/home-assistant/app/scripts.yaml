---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hass-scripts
  namespace: default
data:
  fake-config.sh: |
    #!/bin/sh -ex
    HASS_DIR="/tmp/hass-config/config"
    CONFIG_FILE="$HASS_DIR/configuration.yaml"
    if [ ! -f $CONFIG_FILE ]; then
        mkdir -p $HASS_DIR
        touch $CONFIG_FILE
        echo "default_config:" > $CONFIG_FILE
    fi

    exit 0

  post-sync.sh: |
    #!/bin/sh -ex
    mkdir -p /tmp/hass-config/config
    cp -rT /tmp/hass-config/gitsync/latest/* /tmp/hass-config/config/
    exit 0
