---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hass-scripts
  namespace: default
data:
  fake-config.sh: |
    #!/bin/sh -ex
    if [ ! -f "/tmp/hass-config/config/configuration.yaml" ]; then
        mkdir -p /tmp/hass-config/config
        touch /tmp/hass-config/config/configuration.yaml
        echo "default_config:" > /tmp/hass-config/config/configuration.yaml
    fi
    exit 0

  post-sync.sh: |
    #!/bin/sh -ex
    mkdir -p /tmp/hass-config/config
    cp -avr /tmp/hass-config/gitsync/latest/* /tmp/hass-config/config/
    exit 0
