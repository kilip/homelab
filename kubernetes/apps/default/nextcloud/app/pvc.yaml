---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nextcloud
spec:
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  storageClassName: nextcloud
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "10.0.0.21"
    path: /tank/nextcloud
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: nextcloud
  resources:
    requests:
      storage: 1Mi
