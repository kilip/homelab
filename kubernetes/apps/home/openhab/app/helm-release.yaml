---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: openhab
  namespace: home
spec:
  interval: 15m
  chart:
    spec:
      chart: emqx
      version: 5.0.23
      sourceRef:
        kind: HelmRepository
        name: openhab
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    imagePullSecrets:
      - name: github-pull-secret
    image:
      repository: ghcr.io/kilip/openhab
      tag: 3.4.3-rc1
      imagePullPolicy: Always
    openhab:
      user_id: 1000
      group_id: 1000
      timezone: Asia/Makassar

  valuesFrom:
    - targetPath: openhab.cloud_uuid
      kind: Secret
      name: openhab-secrets
      valuesKey: cloud_uuid
    - targetPath: openhab.cloud_secret
      kind: Secret
      name: openhab-secrets
      valuesKey: cloud_secret
