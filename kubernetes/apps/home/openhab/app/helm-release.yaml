---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: openhab
  namespace: home
spec:
  interval: 15m
  chart:
    spec:
      chart: openhab
      version: 3.4.3-rc2
      sourceRef:
        kind: HelmRepository
        name: olympus
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    imagePullSecrets:
      - name: github-pull-secret
        namespace: default
    image:
      repository: ghcr.io/kilip/openhab
      tag: 3.4.3-rc1
      imagePullPolicy: IfNotPresent
    openhab:
      user_id: 1000
      group_id: 1000
      timezone: Asia/Makassar
    persistence:
      userdata:
        existingClaim: openhab-userdata-pvc
      config:
        existingClaim: openhab-config-pvc

  valuesFrom:
    - targetPath: openhab.cloud_uuid
      kind: Secret
      name: openhab-secrets
      valuesKey: cloud_uuid
    - targetPath: openhab.cloud_secret
      kind: Secret
      name: openhab-secrets
      valuesKey: cloud_secret
