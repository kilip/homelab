---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app snmp-exporter-mikrotik
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    image:
      repository: ghcr.io/akpw/mktxp
      tag: stable-20230320065317
    env:
      TZ: "${TIMEZONE}"
    persistence:
      mktxp.conf:
        enabled: true
        type: secret
        name: mikrotik
        defaultMode: 0777
        subPath:
          - path: mktxp.conf
            mountPath: /root/mktxp/mktxp.conf
      _mktxp.conf:
        enabled: true
        type: secret
        name: mikrotik
        defaultMode: 0777
        subPath:
          - path: mktxp.conf
            mountPath: /root/mktxp/_mktxp.conf
    service:
      main:
        ports:
          http:
            port: 49090
    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
      startup:
        enabled: false
