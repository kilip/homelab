---
- name: Ensure zabbix installed
  when: zabbix
  block:
    - name: Ensure zabbix postgres database configured
      ansible.builtin.include_tasks: postgres-db.yml
      vars:
        db_user: "{{ zabbix_db_user }}"
        db_pass: "{{ zabbix_db_pass }}"
        db_host: "{{ zabbix_db_host }}"
        db_name: "{{ zabbix_db_name }}"

    - name: Ensure zabbix server installed
      community.docker.docker_container:
        name: zabbix-server
        image: zabbix/zabbix-server-pgsql:ubuntu-latest
        env:
          DB_SERVER_HOST: "postgres"
          DB_SERVER_PORT: "5432"
          POSTGRES_USER: "{{ zabbix_db_user }}"
          POSTGRES_PASSWORD: "{{ zabbix_db_pass }}"
          POSTGRES_DB: "{{ zabbix_db_name }}"
        networks:
          - name: "{{ docker_network }}"
        healthcheck:
          test: grep -qr "zabbix-server" /proc/*/status || exit 1
          interval: 10s
          timeout: 5s
          retries: 20
          start_period: 120s
        ports:
          - "10051:10051"
        restart_policy: always
        state: started

    - name: Ensure zabbix dashboard installed
      community.docker.docker_container:
        name: zabbix-dashboard
        image: zabbix/zabbix-web-nginx-pgsql:ubuntu-latest
        env:
          DB_SERVER_HOST: "postgres"
          DB_SERVER_PORT: "5432"
          POSTGRES_USER: "{{ zabbix_db_user }}"
          POSTGRES_PASSWORD: "{{ zabbix_db_pass }}"
          POSTGRES_DB: "{{ zabbix_db_name }}"
          ZBX_SERVER_HOST: zabbix-server
          PHP_TZ: "Asia/Makassar"
        networks:
          - name: "{{ docker_network }}"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/"]
          interval: 10s
          timeout: 5s
          retries: 3
          start_period: 90s
        restart_policy: always
        state: started
        labels:
          traefik.enable: "true"
          traefik.http.routers.zabbix.entrypoints: websecure
          traefik.http.routers.zabbix.service: zabbix
          traefik.http.routers.zabbix.rule: "Host(`zabbix.{{ traefik_domain }}`)"
          traefik.http.services.zabbix.loadbalancer.server.port: "8080"

    - name: Ensure zabbix agent installed
      community.docker.docker_container:
        name: zabbix-agent
        image: zabbix/zabbix-agent2:7.4.10-ubuntu
        state: started
        env:
          ZBX_HOSTNAME: Mars
          ZBX_SERVER_HOST: zabbix-server
        networks:
          - name: "{{ docker_network }}"
        restart_policy: unless-stopped
