---
postgres: false
# renovate: datasource=docker depName=postgis/postgis
pg_version: 18-3.6-alpine
pg_image: "postgis/postgis:{{ pg_version }}"
pg_user: homelab
pg_pass: homelab
pg_db: homelab
pg_host: homelab

# renovate: datasource=docker depName=redis
redis_version: 8.6.2
redis_image: "redis:{{ redis_version }}-alpine"

# renovate: datasource=docker depName=quay.io/minio/minio
minio_version: RELEASE.2025-09-07T16-13-09Z
minio: false
minio_user: minio
minio_pass: minio

mysql: false
# renovate: datasource=docker depName=mysql
mysql_image: mysql:8.4.9
mysql_container_name: "mysql"
mysql_port: 3306
mysql_root_password: "CHANGEME_MYSQL_ROOT_PASSWORD"
mysql_db: "default_mysql_database"
mysql_user: "default_mysql_user"
mysql_pass: "CHANGEME_MYSQL_USER_PASSWORD"
